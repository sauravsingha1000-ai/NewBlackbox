name: Android CI

on:
push:
branches: [ main ]
pull_request:
branches: [ main ]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - name: Setup Android SDK
    uses: android-actions/setup-android@v3
    with:
      cmdline-tools-version: '11076708'
      packages: |
        platforms;android-35
        build-tools;35.0.0
        ndk;26.2.11394342
        platform-tools

  - name: Accept Android SDK Licenses
    run: yes | sdkmanager --licenses || true

  - name: Verify SDK Installation
    run: |
      echo "Android SDK Location: $ANDROID_SDK_ROOT"
      ls -la $ANDROID_SDK_ROOT/ndk/ || true
      echo "Installed platforms:"
      sdkmanager --list | grep "platforms;android-35" || true

  - name: Make gradlew executable
    run: chmod +x gradlew

  - name: Clean Project
    run: ./gradlew clean

  - name: Build Debug APK
    env:
      ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.2.11394342
      ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.2.11394342
      GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
      ANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES: "ON"
    run: |
      echo "Checking NDK..."
      if [ -d "$ANDROID_NDK_HOME" ]; then
        echo "NDK found at: $ANDROID_NDK_HOME"
        cat $ANDROID_NDK_HOME/source.properties | grep Pkg.Revision || true
      fi

      ./gradlew assembleDebug --stacktrace --no-daemon

  - name: Locate APK
    run: |
      echo "Searching for APK files..."
      find app/build -name "*.apk" || echo "No APK found"

  - name: Upload APK Artifact
    uses: actions/upload-artifact@v4
    with:
      name: android-build
      path: |
        app/build/outputs/apk/
        Bcore/build/intermediates/**/*.so
      if-no-files-found: warn
      retention-days: 7
